<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Returning to RunToMax…</title>
  <style>
    body {
      font: 17px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 22rem; margin: 4rem auto; padding: 0 1rem;
      color: #2a2a2a; text-align: center;
    }
    a { color: #fc5200; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #777; font-size: 14px; margin-top: 1.25rem; }
  </style>
</head>
<body>
  <p>Returning to <strong>RunToMax</strong>…</p>
  <p class="muted">
    If the app didn't open automatically,
    <a id="manual" href="#">tap here</a>.
  </p>
  <script>
    // Strava → this static page (DNS-resolvable host so Strava's
    // authorize-endpoint validator accepts it) → custom URL scheme back
    // into the iOS app. ASWebAuthenticationSession watches for the
    // `runtomax.app://` scheme and dismisses, handing the OAuth `code`
    // query parameter to the app's auth handler.
    (function () {
      var q = window.location.search || "";
      var target = "runtomax.app://strava/callback" + q;
      // Manual fallback link, set before redirect so it's correct
      // even if the user lands here outside the OAuth flow.
      var link = document.getElementById("manual");
      if (link) link.href = target;
      // Tiny delay so the visible "Returning…" text renders before the
      // browser starts navigating (helps when testing on desktop where
      // the custom scheme will land on a blank page).
      setTimeout(function () { window.location.replace(target); }, 80);
    })();
  </script>
</body>
</html>
