<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Returning to RunToMax…</title>
  <style>
    body {
      font: 17px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 22rem; margin: 4rem auto; padding: 0 1rem;
      color: #2a2a2a; text-align: center;
    }
    a { color: #fc5200; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #777; font-size: 14px; margin-top: 1.25rem; }
  </style>
  <script>
    // Strava → this static page (real DNS-resolvable host so Strava's
    // authorize-endpoint validator accepts it) → custom URL scheme back
    // into the iOS app. ASWebAuthenticationSession watches for the
    // `runtomax.app://` scheme and dismisses, handing the OAuth `code`
    // query parameter to the app's auth handler.
    (function () {
      var q = window.location.search || "";
      var target = "runtomax.app://strava/callback" + q;
      // `replace` so this static page doesn't leave a back-button entry.
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Returning to <strong>RunToMax</strong>…</p>
  <p class="muted">
    If the app didn't open automatically,
    <a id="manual" href="#">tap here</a>.
  </p>
  <script>
    // Manual fallback link — pulled at click time so it always carries
    // the live query string instead of being baked in at parse time.
    document.getElementById("manual").href =
      "runtomax.app://strava/callback" + (window.location.search || "");
  </script>
</body>
</html>
